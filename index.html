<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26FW 拍攝進度統計</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2ede8; --surface: #ffffff; --surface2: #f7f3ef;
      --border: #e0d8d0; --accent: #8b6f5e; --accent2: #a8856f;
      --text: #2d2420; --text-dim: #9c8c82;
      --green: #5a8a6a; --yellow: #b8892a; --red: #b85a4a; --purple: #7a6a9a;
      --glow: rgba(139,111,94,0.12);
      --nav: #3d2e28;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh; padding: 0 0 4rem;
    }

    /* Top nav bar like screenshot */
    .topbar {
      background: var(--nav); color: #e8ddd6;
      padding: 0 2rem; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-brand { font-size: 0.88rem; font-weight: 700; letter-spacing: 0.05em; color: #d4b89a; }
    .topbar-title { font-size: 0.8rem; color: #c4b0a4; font-weight: 400; }

    .page-body { padding: 2rem 1.5rem 2rem; }
    .container { max-width: 960px; margin: 0 auto; position: relative; }

    /* Header */
    header { margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
    .header-label { font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:0.4rem; }
    h1 { font-size:clamp(1.4rem,3.5vw,2rem); font-weight:700; letter-spacing:-0.02em; line-height:1.2; color:var(--text); }
    h1 span { color:var(--text); }
    .subtitle { margin-top:0.4rem; color:var(--text-dim); font-size:0.85rem; font-weight:300; }

    /* Tabs */
    .tabs { display:flex; gap:0.25rem; margin-bottom:1.8rem; border-bottom:1px solid var(--border); }
    .tab {
      padding:0.55rem 1.2rem; font-size:0.85rem; font-weight:500; cursor:pointer;
      color:var(--text-dim); border-bottom:2px solid transparent; margin-bottom:-1px;
      transition:color 0.2s,border-color 0.2s; border-radius:4px 4px 0 0;
    }
    .tab:hover { color:var(--accent); background:var(--surface2); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--surface2); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Section label */
    .section-label { font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:0.9rem; }

    /* DB table */
    .db-info { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1.5rem; box-shadow:0 1px 4px rgba(139,111,94,0.08); }
    .db-info-header { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.4rem; background:var(--surface2); border-bottom:1px solid var(--border); }
    .db-info-title { font-size:0.88rem; font-weight:500; color:var(--text); }
    .badge { font-family:'DM Mono',monospace; font-size:0.68rem; padding:0.2rem 0.6rem; background:rgba(139,111,94,0.1); color:var(--accent); border-radius:99px; border:1px solid rgba(139,111,94,0.25); }
    .badge.green { background:rgba(90,138,106,0.1); color:var(--green); border-color:rgba(90,138,106,0.3); }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:0.65rem 1.4rem; font-size:0.7rem; font-family:'DM Mono',monospace; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); text-align:left; background:var(--surface2); border-bottom:1px solid var(--border); }
    thead th:not(:first-child) { text-align:right; }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.12s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#faf6f2; }
    td { padding:0.8rem 1.4rem; font-size:0.87rem; color:var(--text); }
    td:not(:first-child) { text-align:right; font-family:'DM Mono',monospace; color:var(--text); }
    .tfoot-row td { padding:0.8rem 1.4rem; background:var(--surface2); border-top:1px solid var(--border); font-weight:600; }
    .tfoot-row td:not(:first-child) { font-family:'DM Mono',monospace; color:var(--accent); }
    .cat-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:0.55rem; vertical-align:middle; }

    /* Progress results */
    #results { margin-bottom:1.2rem; }

    /* Summary cards */
    .stats-row { display:flex; flex-direction:column; gap:0.75rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0.9rem 1.1rem; position:relative; overflow:hidden; transition:border-color 0.2s,box-shadow 0.2s; box-shadow:0 1px 3px rgba(139,111,94,0.07); }
    .stat-card::after { content:''; position:absolute; top:0;left:0;right:0;height:3px; background:var(--accent); opacity:0; transition:opacity 0.2s; border-radius:3px 3px 0 0; }
    .stat-card:hover { border-color:var(--accent); box-shadow:0 2px 8px var(--glow); }
    .stat-card:hover::after { opacity:1; }
    .stat-label { font-size:0.7rem; color:var(--text-dim); margin-bottom:0.3rem; }
    .stat-value { font-family:'DM Mono',monospace; font-size:1.5rem; font-weight:500; color:var(--accent); line-height:1; }
    .stat-value.green { color:var(--green); }
    .stat-value.yellow { color:var(--yellow); }
    .stat-unit { font-size:0.62rem; color:var(--text-dim); margin-left:2px; }

    /* Progress table */
    .prog-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(139,111,94,0.08); }
    .prog-table-header { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.4rem; background:var(--surface2); border-bottom:1px solid var(--border); }
    .prog-table-title { font-size:0.88rem; font-weight:500; color:var(--text); }

    .prog-bar-wrap { min-width:100px; }
    .prog-track { height:5px; background:var(--border); border-radius:99px; overflow:hidden; margin-bottom:0.22rem; }
    .prog-fill { height:100%; border-radius:99px; background:var(--accent); transition:width 0.9s cubic-bezier(0.22,1,0.36,1); }
    .prog-pct { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--text-dim); }

    .status-pill { display:inline-block; padding:0.15rem 0.55rem; border-radius:99px; font-size:0.7rem; font-weight:500; }
    .pill-done { background:rgba(90,138,106,0.1); color:var(--green); border:1px solid rgba(90,138,106,0.3); }
    .pill-partial { background:rgba(184,137,42,0.1); color:var(--yellow); border:1px solid rgba(184,137,42,0.3); }
    .pill-none { background:rgba(184,90,74,0.07); color:var(--red); border:1px solid rgba(184,90,74,0.2); }

    td.prog-td { min-width:130px; }
    td.num { text-align:right; font-family:'DM Mono',monospace; font-size:0.87rem; color:var(--text); }
    td.num-done { text-align:right; font-family:'DM Mono',monospace; font-size:0.87rem; color:var(--green); }
    td.num-total { text-align:right; font-family:'DM Mono',monospace; font-size:0.87rem; color:var(--text-dim); }

    .note { margin-top:0.85rem; font-size:0.73rem; color:var(--text-dim); display:flex; align-items:center; gap:0.4rem; }

    .warn-box { padding:0.85rem 1.1rem; background:rgba(184,137,42,0.07); border:1px solid rgba(184,137,42,0.25); border-radius:8px; color:var(--yellow); font-size:0.82rem; margin-top:0.9rem; display:none; }
    .warn-box.show { display:block; }

    /* Layout */
    .main-layout { max-width:100%; }
    .content-col { width:100%; }

    /* Action row: upload + download side by side below table */
    .action-row { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-top:1.5rem; align-items:start; }
    .action-panel {}

    /* Upload zone */
    .upload-zone {
      border:1.5px dashed var(--border); border-radius:10px; padding:1.2rem 1.4rem;
      cursor:pointer; transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
      background:var(--surface); position:relative; overflow:hidden;
      box-shadow:0 1px 4px rgba(139,111,94,0.06);
    }
    .upload-zone::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,var(--glow),transparent 70%); opacity:0; transition:opacity 0.3s; }
    .upload-zone:hover,.upload-zone.drag-over { border-color:var(--accent); background:var(--surface2); box-shadow:0 0 0 3px rgba(139,111,94,0.1); }
    .upload-zone:hover::before,.upload-zone.drag-over::before { opacity:1; }
    .upload-row { display:flex; align-items:center; justify-content:space-between; gap:1rem; position:relative; z-index:1; }
    .upload-left { display:flex; align-items:center; gap:0.7rem; }
    .upload-icon { font-size:1.8rem; display:block; flex-shrink:0; }
    .upload-title { font-size:0.82rem; font-weight:500; color:var(--text); white-space:nowrap; }
    .upload-hint { font-size:0.7rem; color:var(--text-dim); font-family:'DM Mono',monospace; line-height:1.5; }
    .upload-btn { display:inline-block; padding:0.42rem 1.2rem; background:var(--accent); color:#fff; border-radius:6px; font-size:0.78rem; font-weight:500; cursor:pointer; transition:background 0.2s,transform 0.1s; position:relative; z-index:1; white-space:nowrap; flex-shrink:0; }
    .upload-btn:hover { background:var(--accent2); transform:translateY(-1px); }
    .upload-btn:hover { background:var(--accent2); transform:translateY(-1px); }
    #fileInput { display:none; }
    .file-chip { display:none; align-items:center; gap:0.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:0.4rem 0.7rem; margin-top:0.7rem; font-size:0.74rem; color:var(--text-dim); flex-wrap:wrap; justify-content:center; }
    .file-chip.show { display:flex; }
    .file-chip-name { color:var(--green); font-family:'DM Mono',monospace; font-size:0.7rem; word-break:break-all; }
    .error-box { display:none; margin-top:0.8rem; padding:0.6rem 0.8rem; background:rgba(184,90,74,0.06); border:1px solid rgba(184,90,74,0.25); border-radius:8px; color:var(--red); font-size:0.76rem; }
    .error-box.show { display:block; }
    .spinner { display:none; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0.6rem auto 0; }
    .spinner.show { display:block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:600px){
      .action-row { grid-template-columns:1fr; }
      .prog-bar-wrap { display:none; }
    }

    /* Download zone */
    .download-zone {
      border:1.5px dashed var(--border); border-radius:10px; padding:1.2rem 1.4rem;
      background:var(--surface); box-shadow:0 1px 4px rgba(139,111,94,0.06);
    }
    .download-icon { font-size:1.8rem; display:block; flex-shrink:0; }
    .download-title { font-size:0.82rem; font-weight:500; color:var(--text); white-space:nowrap; }
    .download-hint { display:none; }
  </style>
</head>
<body>
<div class="topbar">
  <span class="topbar-brand">emily_lu</span>
  <span class="topbar-title">版本：2026/06/10</span>
</div>
<div class="page-body">
<div class="container">
  <header>
    <h1>26FW<span>拍攝進度</span></h1>
  </header>

  <div class="main-layout">
    <!-- ── Full width content ── -->
    <div class="content-col">
      <div class="warn-box" id="warnBox">⚠ 上傳的分類與資料庫分類有不符，無基準的分類將以「—」顯示目標套數。</div>

      <!-- Chart + Stats two-column layout -->
      <div id="chartSection" style="display:none;margin-bottom:2rem;">
        <div style="display:grid;grid-template-columns:220px 1fr;gap:1rem;align-items:stretch;">

          <!-- Left: stats cards vertical -->
          <div id="statsRow" style="display:flex;flex-direction:column;gap:0.75rem;"></div>

          <!-- Right: chart -->
          <div class="prog-table-wrap" style="padding:1.2rem 1.4rem;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
              <p style="font-size:0.82rem;font-weight:600;color:var(--text);letter-spacing:0.02em;margin:0;">拍樣拍攝進度</p>
              <div style="display:flex;align-items:center;gap:1rem;font-size:0.72rem;color:var(--text-dim);">
                <span style="display:flex;align-items:center;gap:0.35rem;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#EBEBEB;border:1px solid #D9D9D9;"></span>目標款式</span>
                <span style="display:flex;align-items:center;gap:0.35rem;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c4a898;"></span>已完成款式</span>
              </div>
            </div>
            <canvas id="monthlyChart" height="120"></canvas>
          </div>
        </div>
      </div>

      <section id="results" style="display:none;">
        <p id="statsTitle"></p>
      </section>

      <!-- 26FW 統計表 -->
      <div class="prog-table-wrap">
        <table>
          <thead>
            <tr>
              <th>商品分類</th>
              <th style="text-align:right">款式合計</th>
              <th style="text-align:right">目標套數</th>
              <th style="text-align:right">已拍完</th>
              <th style="text-align:right">完成進度（剩餘）</th>
              <th style="text-align:right">每日拍攝量</th>
              <th style="text-align:right">工作天數</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
          <tfoot><tr class="tfoot-row" id="totalRow"></tr></tfoot>
        </table>
      </div>
      <p class="note"><span>ℹ</span><span>目標套數來自 26FW 總款式資料庫；已拍完套數從進度 Excel 篩選「已拍完」加總。</span></p>
      <p class="note" id="uploadDateNote" style="display:none"><span>🕐</span><span id="uploadDateText"></span></p>

      <!-- Upload + Download row -->
      <div class="action-row">
        <!-- Upload -->
        <div class="action-panel">
          <p class="section-label">上傳進度檔</p>
          <div class="upload-zone" id="dropZone">
            <div class="upload-row">
              <div class="upload-left">
                <span class="upload-icon">📂</span>
                <p class="upload-title">拖曳 Excel 至此</p>
              </div>
              <label class="upload-btn" for="fileInput">選擇檔案</label>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" />
            <div class="spinner" id="spinner"></div>
            <div class="file-chip" id="fileChip"><span>📄</span><span class="file-chip-name" id="fileName"></span></div>
            <div class="error-box" id="errorBox"></div>
          </div>
        </div>

        <!-- Download -->
        <div class="action-panel" id="downloadPanel" style="display:none">
          <p class="section-label">下載統計表</p>
          <div class="download-zone">
            <div class="upload-row">
              <div class="upload-left">
                <span class="download-icon">📥</span>
                <p class="download-title">26FW 進度統計</p>
              </div>
              <button class="upload-btn" id="downloadBtn">下載 Excel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
  const DATABASE = [
    { category: '女款',   styles: 421, target: 750, dailyDefault: 30 },
    { category: '男款',   styles: 231, target: 362, dailyDefault: 40 },
    { category: '中性款', styles: 27,  target: 40,  dailyDefault: 30 },
    { category: '童款',   styles: 294, target: 490, dailyDefault: 33 },
    { category: 'Baby款', styles: 150, target: 306, dailyDefault: 21 },
    { category: '女童款', styles: 1,   target: 2,   dailyDefault: 22 },
  ];
  const DB_MAP = Object.fromEntries(DATABASE.map(d => [d.category, d]));
  const DB_TOTAL_TARGET = DATABASE.reduce((s, d) => s + d.target, 0);
  const DB_TOTAL_STYLES = DATABASE.reduce((s, d) => s + d.styles, 0);
  const COLORS = ['#8b6f5e','#b8892a','#5a8a6a','#a86858','#7a8a6a','#9a7a5a','#6a8a9a'];

  // ── IndexedDB helpers ──
  const IDB_NAME = 'photo-progress', IDB_STORE = 'cache', IDB_KEY = 'last';
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
      req.onsuccess = e => res(e.target.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function saveToIDB(data) {
    try {
      const db = await openDB();
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(data, IDB_KEY);
    } catch(e) { console.warn('IDB save failed', e); }
  }
  async function loadFromIDB() {
    try {
      const db = await openDB();
      return new Promise(res => {
        const req = db.transaction(IDB_STORE).objectStore(IDB_STORE).get(IDB_KEY);
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => res(null);
      });
    } catch(e) { return null; }
  }

  // ── DOM refs ──
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const spinner = document.getElementById('spinner');
  const fileChip = document.getElementById('fileChip');
  const fileNameEl = document.getElementById('fileName');
  const errorBox = document.getElementById('errorBox');
  const warnBox = document.getElementById('warnBox');

  // ── On load: restore saved data or show default ──
  (async function init() {
    const saved = await loadFromIDB();
    if (saved) {
      fileNameEl.textContent = saved.fileName;
      fileChip.classList.add('show');
      render(saved.rows, saved.totalDone, saved.overallPct);
      if (saved.chartData) renderChart(saved.chartData);
      if (saved.uploadedAt) showUploadDate(saved.uploadedAt);
      showDownloadPanel(saved.rows, saved.totalDone, saved.overallPct);
    } else {
      renderDefault();
    }
  })();

  function renderDefault() {
    const tbody = document.getElementById('tableBody');
    const sorted = [...DATABASE].sort((a, b) => b.styles - a.styles);
    tbody.innerHTML = sorted.map(d => `
      <tr>
        <td>${d.category}</td>
        <td class="num">${d.styles.toLocaleString()}</td>
        <td class="num-total">${d.target.toLocaleString()}</td>
        <td class="num-done">—</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:0.87rem;color:var(--text-dim)">—</td>
        <td></td><td></td>
      </tr>`).join('');
    document.getElementById('totalRow').innerHTML = `
      <td>合計</td>
      <td class="num">${DB_TOTAL_STYLES.toLocaleString()}</td>
      <td class="num-total">${DB_TOTAL_TARGET.toLocaleString()}</td>
      <td class="num-done">—</td><td></td><td></td><td></td>`;
  }

  // ── Upload events ──
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

  function showError(msg) { errorBox.textContent = '⚠ ' + msg; errorBox.classList.add('show'); spinner.classList.remove('show'); }

  function processFile(file) {
    errorBox.classList.remove('show');
    warnBox.classList.remove('show');
    fileChip.classList.remove('show');
    spinner.classList.add('show');

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (!raw.length) throw new Error('工作表無資料');

        const keys = Object.keys(raw[0]);
        const colA = keys.find(k => /狀態/.test(k)) || keys[0];
        const colB = keys.find(k => /款號/.test(k)) || keys[1];
        const colD = keys.find(k => /商品分類/.test(k)) || keys[3];
        const colK = keys.find(k => /拍樣繳交/.test(k)) || keys[10];
        const colS = keys.find(k => /拍攝套數/.test(k));
        if (!colS) throw new Error('找不到「拍攝套數」欄位');

        // Build monthly chart data: K=date, B=style no (deduplicate), D=category
        // forward fill B and D columns
        let lastB1 = '', lastD2 = '';
        const chartRows = raw.map(row => {
          if (row[colB] !== '') lastB1 = String(row[colB]).trim();
          if (row[colD] !== '') lastD2 = String(row[colD]).trim();
          return {
            styleNo: lastB1,
            category: lastD2,
            dateVal: row[colK],
          };
        }).filter(r => r.styleNo && r.styleNo !== '' && r.dateVal && r.dateVal !== '');

        // Deduplicate by styleNo (keep first occurrence)
        const seenStyles = new Set();
        const uniqueChartRows = chartRows.filter(r => {
          if (seenStyles.has(r.styleNo)) return false;
          seenStyles.add(r.styleNo);
          return true;
        });

        // Build completed chart data: exclude 已刪除款式/不拍/待安排/待拍攝
        const EXCLUDE_STATUS = new Set(['已刪除款式', '不拍', '待安排', '待拍攝']);
        let lastA2 = '', lastB2 = '', lastD3 = '';
        const doneChartRows = raw.map(row => {
          if (row[colA] !== '') lastA2 = String(row[colA]).trim();
          if (row[colB] !== '') lastB2 = String(row[colB]).trim();
          if (row[colD] !== '') lastD3 = String(row[colD]).trim();
          return {
            status: lastA2,
            styleNo: lastB2,
            category: lastD3,
            dateVal: row[colK],
          };
        }).filter(r =>
          !EXCLUDE_STATUS.has(r.status) &&
          r.styleNo && r.styleNo !== '' &&
          r.dateVal && r.dateVal !== ''
        );
        const seenDoneStyles = new Set();
        const uniqueDoneRows = doneChartRows.filter(r => {
          if (seenDoneStyles.has(r.styleNo)) return false;
          seenDoneStyles.add(r.styleNo);
          return true;
        });

        // Parse month from date value (Excel serial or string)
        function getMonth(val) {
          if (typeof val === 'number') {
            // Excel serial date
            const date = new Date((val - 25569) * 86400 * 1000);
            return date.getUTCMonth() + 1;
          }
          if (typeof val === 'string') {
            const m = val.match(/(\d{4})[\/\-](\d{1,2})/);
            if (m) return parseInt(m[2]);
          }
          return null;
        }

        // Aggregate target: monthlyData[month][category] = count
        const categories = [...new Set(uniqueChartRows.map(r => r.category).filter(Boolean))];
        const monthlyData = {};
        for (let m = 1; m <= 12; m++) monthlyData[m] = {};
        uniqueChartRows.forEach(r => {
          const month = getMonth(r.dateVal);
          if (!month) return;
          if (!monthlyData[month][r.category]) monthlyData[month][r.category] = 0;
          monthlyData[month][r.category]++;
        });

        // Aggregate done: monthlyDone[month][category] = count
        const monthlyDone = {};
        for (let m = 1; m <= 12; m++) monthlyDone[m] = {};
        uniqueDoneRows.forEach(r => {
          const month = getMonth(r.dateVal);
          if (!month) return;
          if (!monthlyDone[month][r.category]) monthlyDone[month][r.category] = 0;
          monthlyDone[month][r.category]++;
        });

        const chartData = { monthlyData, monthlyDone, categories };

        // Calculate styles from Excel: C欄=2026秋冬, deduplicate B欄 per D欄商品分類
        const colC = keys.find(k => /季別/.test(k)) || keys[2];
        let lastB3 = '', lastC3 = '', lastD4 = '';
        const stylesMap = {};
        const seenStylesForCount = {};
        raw.forEach(row => {
          if (row[colB] !== '') lastB3 = String(row[colB]).trim();
          if (row[colC] !== '') lastC3 = String(row[colC]).trim();
          if (row[colD] !== '') lastD4 = String(row[colD]).trim();
          if (lastC3 !== '2026秋冬' || !lastB3 || !lastD4) return;
          if (!seenStylesForCount[lastD4]) seenStylesForCount[lastD4] = new Set();
          seenStylesForCount[lastD4].add(lastB3);
        });
        Object.keys(seenStylesForCount).forEach(cat => {
          stylesMap[cat] = seenStylesForCount[cat].size;
        });

        let lastA = '', lastD = '';
        const filled = raw.map(row => {
          if (row[colA] !== '') lastA = String(row[colA]).trim();
          if (row[colD] !== '') lastD = String(row[colD]).trim();
          return { status: lastA, category: lastD, count: Number(row[colS]) || 0 };
        });

        const done = filled.filter(r => r.status === '已拍完');
        if (!done.length) throw new Error('找不到「已拍完」狀態的資料');

        const agg = {};
        done.forEach(r => { agg[r.category] = (agg[r.category] || 0) + r.count; });

        const allCats = [...new Set([...DATABASE.map(d => d.category), ...Object.keys(agg)])];
        const rows = allCats.map(cat => ({
          category: cat,
          done: agg[cat] || 0,
          styles: stylesMap[cat] ?? (DB_MAP[cat] ? DB_MAP[cat].styles : null),
          target: DB_MAP[cat] ? DB_MAP[cat].target : null,
          inDB: !!DB_MAP[cat],
        })).sort((a, b) => (b.styles ?? 0) - (a.styles ?? 0));

        const totalDone = rows.reduce((s, r) => s + r.done, 0);
        const overallPct = DB_TOTAL_TARGET > 0 ? Math.round(totalDone / DB_TOTAL_TARGET * 100) : 0;

        if (rows.some(r => !r.inDB && r.done > 0)) warnBox.classList.add('show');

        // Save to IndexedDB
        const uploadedAt = new Date().toISOString();
        saveToIDB({ fileName: file.name, rows, totalDone, overallPct, uploadedAt, chartData });

        render(rows, totalDone, overallPct);
        renderChart(chartData);
        showUploadDate(uploadedAt);
        showDownloadPanel(rows, totalDone, overallPct);
        spinner.classList.remove('show');
        fileNameEl.textContent = file.name;
        fileChip.classList.add('show');
      } catch (err) {
        showError(err.message || '解析失敗，請確認檔案格式');
      }
    };
    reader.onerror = () => showError('檔案讀取失敗');
    reader.readAsArrayBuffer(file);
  }

  let monthlyChartInstance = null;

  function renderChart({ monthlyData, monthlyDone, categories }) {
    document.getElementById('chartSection').style.display = 'block';

    // Only months with data
    const activeMonths = [];
    for (let m = 1; m <= 12; m++) {
      const total = categories.reduce((s, c) => s + (monthlyData[m][c] || 0), 0);
      if (total > 0) activeMonths.push(m);
    }

    const labels = activeMonths.map(m => `${m}月`);
    const monthTotals = activeMonths.map(m =>
      categories.reduce((s, c) => s + (monthlyData[m][c] || 0), 0)
    );
    const monthDoneTotals = activeMonths.map(m =>
      categories.reduce((s, c) => s + ((monthlyDone || {})[m]?.[c] || 0), 0)
    );

    const ctx = document.getElementById('monthlyChart').getContext('2d');
    if (monthlyChartInstance) monthlyChartInstance.destroy();

    // Plugin: draw value on top of each bar
    const valueLabelPlugin = {
      id: 'valueLabel',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        chart.data.datasets.forEach((ds, di) => {
          const isTarget = ds.label === '目標款式';
          ctx.font = isTarget ? '500 10px DM Mono, monospace' : '600 10px DM Mono, monospace';
          ctx.fillStyle = isTarget ? '#9c8c82' : '#2d2420';
          chart.getDatasetMeta(di).data.forEach((bar, i) => {
            const val = ds.data[i];
            if (val > 0) ctx.fillText(val, bar.x, bar.y - (isTarget ? 14 : 4));
          });
        });
        ctx.restore();
      }
    };

    // Custom tooltip positioner: keep inside chart area
    Chart.Tooltip.positioners.insideChart = function(elements, eventPosition) {
      const chart = this.chart;
      const chartArea = chart.chartArea;
      let x = eventPosition.x + 12;
      let y = chartArea.top;
      if (x + 200 > chartArea.right) x = eventPosition.x - 212;
      return { x, y };
    };

    // External HTML tooltip handler
    function htmlTooltipHandler(context) {
      let tooltipEl = document.getElementById('chartHtmlTooltip');
      if (!tooltipEl) {
        tooltipEl = document.createElement('div');
        tooltipEl.id = 'chartHtmlTooltip';
        tooltipEl.style.cssText = `
          position:fixed;pointer-events:none;z-index:9999;
          background:rgba(255,255,255,0.97);border:1px solid #e0d8d0;
          border-radius:8px;padding:10px 12px;font-size:11px;
          font-family:'Noto Sans TC',sans-serif;color:#5a4a40;
          box-shadow:0 4px 16px rgba(139,111,94,0.15);
          max-height:80vh;overflow-y:auto;min-width:160px;
        `;
        document.body.appendChild(tooltipEl);
      }

      const { tooltip } = context;
      if (tooltip.opacity === 0) { tooltipEl.style.display = 'none'; return; }

      const mi = activeMonths[tooltip.dataPoints?.[0]?.dataIndex];
      if (mi === undefined) return;

      const doneTotal = categories.reduce((s, c) => s + ((monthlyDone || {})[mi]?.[c] || 0), 0);
      const targetTotal = categories.reduce((s, c) => s + (monthlyData[mi][c] || 0), 0);

      let html = `<div style="font-weight:600;color:#2d2420;margin-bottom:6px;">${mi}月</div>`;
      html += `<div style="margin-bottom:2px;"><span style="display:inline-block;width:8px;height:8px;border-radius:1px;background:#c4a898;margin-right:5px;"></span>已完成款式：${doneTotal} 款</div>`;
      html += `<div style="margin-bottom:8px;"><span style="display:inline-block;width:8px;height:8px;border-radius:1px;background:#EBEBEB;border:1px solid #D9D9D9;margin-right:5px;"></span>目標款式：${targetTotal} 款</div>`;

      // 目標細項
      const targetLines = categories.filter(c => (monthlyData[mi][c] || 0) > 0);
      if (targetLines.length) {
        html += `<div style="color:#9c8c82;font-size:10px;border-top:1px solid #e0d8d0;padding-top:6px;margin-bottom:4px;">── 目標細項 ──</div>`;
        targetLines.forEach(c => {
          html += `<div style="margin-bottom:2px;">${c}：${monthlyData[mi][c]} 款</div>`;
        });
      }

      // 未完成細項
      const remLines = categories.filter(c => {
        const rem = (monthlyData[mi][c] || 0) - ((monthlyDone || {})[mi]?.[c] || 0);
        return rem > 0;
      });
      if (remLines.length) {
        html += `<div style="color:#9c8c82;font-size:10px;border-top:1px solid #e0d8d0;padding-top:6px;margin-top:4px;margin-bottom:4px;">── 未完成細項 ──</div>`;
        remLines.forEach(c => {
          const rem = (monthlyData[mi][c] || 0) - ((monthlyDone || {})[mi]?.[c] || 0);
          html += `<div style="margin-bottom:2px;">${c}：${rem} 款</div>`;
        });
      }

      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';

      // Position: follow mouse, flip if near edge
      const canvasRect = context.chart.canvas.getBoundingClientRect();
      const pos = tooltip.caretX;
      let left = canvasRect.left + pos + 14;
      let top = canvasRect.top + tooltip.caretY - 10;
      const tw = tooltipEl.offsetWidth || 180;
      const th = tooltipEl.offsetHeight || 200;
      if (left + tw > window.innerWidth - 10) left = canvasRect.left + pos - tw - 14;
      if (top + th > window.innerHeight - 10) top = window.innerHeight - th - 10;
      tooltipEl.style.left = left + 'px';
      tooltipEl.style.top = top + 'px';
    }

    monthlyChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: '目標款式',
            data: monthTotals,
            backgroundColor: '#EBEBEB',
            borderRadius: 4,
            borderSkipped: false,
            order: 2,
            barPercentage: 0.6,
            categoryPercentage: 0.7,
          },
          {
            label: '已完成款式',
            data: monthDoneTotals,
            backgroundColor: '#c4a898',
            borderRadius: 4,
            borderSkipped: false,
            order: 1,
            barPercentage: 0.6,
            categoryPercentage: 0.7,
          },
        ]
      },
      plugins: [valueLabelPlugin],
      options: {
        responsive: true,
        grouped: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: false,
          },
          tooltip: {
            enabled: false,
            external: htmlTooltipHandler,
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { family: 'Noto Sans TC', size: 11 }, color: '#9c8c82' },
            border: { color: '#e0d8d0' }
          },
          y: {
            grid: { color: '#e0d8d0', lineWidth: 1 },
            ticks: { font: { family: 'DM Mono', size: 10 }, color: '#9c8c82' },
            border: { dash: [4,4], color: 'transparent' },
            grace: '0%',
          }
        },
      }
    });

    ctx.canvas.addEventListener('mouseleave', () => {
      const el = document.getElementById('chartHtmlTooltip');
      if (el) el.style.display = 'none';
    });
  }

  function showDownloadPanel(rows, totalDone, overallPct) {
    document.getElementById('downloadPanel').style.display = 'block';
    document.getElementById('downloadBtn').onclick = () => downloadExcel(rows, totalDone, overallPct);
  }

  function downloadExcel(rows, totalDone, overallPct) {
    const now = new Date();

    // Collect row data
    const dataRows = rows.map(r => {
      const rem = r.target !== null ? r.target - r.done : null;
      const dailyEl = document.getElementById(`daily-${r.category}`);
      const daysEl  = document.getElementById(`days-${r.category}`);
      const daily = dailyEl && dailyEl.value ? Number(dailyEl.value) : '';
      const daysText = daysEl ? daysEl.textContent.replace(/,/g,'') : '';
      const days = (daysText && daysText !== '—' && daysText !== '✓') ? Number(daysText) : '';
      return [ r.category, r.styles ?? '', r.target ?? '', r.done,
               rem !== null ? (rem <= 0 ? 0 : rem) : '', daily, days ];
    });

    const totalDaysEl  = document.getElementById('totalDaysCell');
    const totalDaysRaw = totalDaysEl ? totalDaysEl.textContent.replace(/,/g,'') : '';
    const totalDays    = (totalDaysRaw && totalDaysRaw !== '—') ? Number(totalDaysRaw) : '';

    // Style definitions (matching reference styles.xml exactly)
    // Header: fill=theme0 tint-0.15 (≈#D9D9D9 visually dark), font Arial 9pt #3C4043, center, border thin theme1 tint0.5
    // Data:   fill=white #FFFFFF, font Arial 9pt #3E3E3E, center, border same
    // Total:  fill=#F7F7F7, font Arial 9pt #3E3E3E, center, border same
    const borderColor = { theme: 1, tint: 0.499984740745262 };
    const thinBorder  = {
      top:    { style: 'thin', color: borderColor },
      bottom: { style: 'thin', color: borderColor },
      left:   { style: 'thin', color: borderColor },
      right:  { style: 'thin', color: borderColor },
    };

    const hStyle = { // header: light gray bg #D9D9D9, black font
      font:      { sz: 9, bold: false, color: { rgb: '000000' }, name: 'Arial', family: 2 },
      fill:      { patternType: 'solid', fgColor: { rgb: 'D9D9D9' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border:    thinBorder,
    };
    const dStyle = { // data rows
      font:      { sz: 9, color: { rgb: '3E3E3E' }, name: 'Arial', family: 2 },
      fill:      { patternType: 'solid', fgColor: { rgb: 'FFFFFF' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border:    thinBorder,
    };
    const tStyle = { // total row
      font:      { sz: 9, color: { rgb: '3E3E3E' }, name: 'Arial', family: 2 },
      fill:      { patternType: 'solid', fgColor: { rgb: 'F7F7F7' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border:    thinBorder,
    };

    // Build worksheet as array of cell objects
    const headers = ['商品分類','款式合計','目標套數','已拍完','完成進度（剩餘）','每日拍攝量','工作天數'];
    const reorderedRows = dataRows.map(r => [r[0], r[1], r[2], r[3], r[4], r[5], r[6]]);
    const totalRowData = ['合計', DB_TOTAL_STYLES, DB_TOTAL_TARGET, totalDone, DB_TOTAL_TARGET - totalDone, '', totalDays];

    const allRows = [
      headers.map(v => ({ v, s: hStyle })),
      ...reorderedRows.map(row => row.map(v => ({ v, s: dStyle }))),
      totalRowData.map(v => ({ v, s: tStyle })),
    ];

    const ws = {};
    allRows.forEach((row, r) => {
      row.forEach((cell, c) => {
        const addr = XLSX.utils.encode_cell({ r, c });
        const t = typeof cell.v === 'number' ? 'n' : 's';
        ws[addr] = { v: cell.v, t, s: cell.s };
      });
    });

    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: allRows.length - 1, c: 6 } });
    ws['!cols'] = [
      { wch: 12.875 }, { wch: 10.875 }, { wch: 10 }, { wch: 10 },
      { wch: 16.875 }, { wch: 12.875 }, { wch: 10.875 }
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '26FW進度統計');

    const fileName = `26FW_拍攝進度統計_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
    XLSX.writeFile(wb, fileName);
  }

  function showUploadDate(isoStr) {
    const d = new Date(isoStr);
    const fmt = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    document.getElementById('uploadDateText').textContent = `資料上傳更新日期：${fmt}`;
    document.getElementById('uploadDateNote').style.display = 'flex';
  }

  function render(rows, totalDone, overallPct) {
    document.getElementById('chartSection').style.display = 'block';
    const remaining = Math.max(0, DB_TOTAL_TARGET - totalDone);
    const color = overallPct >= 100 ? '#5a8a6a' : overallPct >= 50 ? '#8b6f5e' : '#b8892a';

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card" style="flex:1;display:flex;flex-direction:column;padding:1rem 1rem;">
        <div class="stat-label" style="margin-bottom:0.8rem;">整體完成率</div>
        <div style="position:relative;width:170px;height:170px;margin:0 auto;">
          <canvas id="donutChart" width="170" height="170"></canvas>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
            <span style="font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:600;color:${color};">${overallPct}<span style="font-size:0.75rem;color:var(--text-dim);margin-left:1px;">%</span></span>
          </div>
        </div>
        <div style="margin-top:1rem;display:flex;flex-direction:column;gap:0.4rem;">
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;color:var(--text);">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></span>
            <span style="color:var(--text-dim);">已拍完套數</span>
            <span style="margin-left:auto;font-family:'DM Mono',monospace;font-weight:600;color:var(--green);">${totalDone.toLocaleString()}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;color:var(--text);">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ebe6e1;border:1px solid #d0c8c0;flex-shrink:0;"></span>
            <span style="color:var(--text-dim);">剩餘套數</span>
            <span style="margin-left:auto;font-family:'DM Mono',monospace;font-weight:600;color:var(--yellow);">${remaining.toLocaleString()}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;border-top:1px solid var(--border);padding-top:0.4rem;margin-top:0.1rem;">
            <span style="display:inline-block;width:8px;height:8px;flex-shrink:0;"></span>
            <span style="color:var(--text-dim);">目標總套數</span>
            <span style="margin-left:auto;font-family:'DM Mono',monospace;font-weight:600;color:var(--text);">${DB_TOTAL_TARGET.toLocaleString()}</span>
          </div>
        </div>
      </div>`;
    document.getElementById('statsTitle').textContent = '';

    requestAnimationFrame(() => {
      const canvas = document.getElementById('donutChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx = 85, cy = 85, r = 68, lineW = 16;
      const pct = Math.min(overallPct / 100, 1);
      const startAngle = -Math.PI / 2;

      function draw() {
        ctx.clearRect(0, 0, 170, 170);
        // Track
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = '#ebe6e1';
        ctx.lineWidth = lineW;
        ctx.stroke();
        // Progress
        if (pct > 0) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, startAngle, startAngle + Math.PI * 2 * pct);
          ctx.strokeStyle = color;
          ctx.lineWidth = lineW;
          ctx.lineCap = 'round';
          ctx.stroke();
        }
      }
      draw();
    });

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = rows.map(r => {
      const rem = r.target !== null ? r.target - r.done : null;
      const remColor = rem === null ? 'var(--text-dim)' : rem <= 0 ? 'var(--green)' : rem < (r.target * 0.3) ? 'var(--yellow)' : 'var(--red)';
      const remDisp = rem !== null ? (rem <= 0 ? '✓ 完成' : rem.toLocaleString()) : '—';
      const dailyId = `daily-${r.category}`;
      const daysId = `days-${r.category}`;
      return `<tr>
        <td>${r.category}</td>
        <td class="num">${r.styles !== null ? r.styles.toLocaleString() : '—'}</td>
        <td class="num-total">${r.target !== null ? r.target.toLocaleString() : '—'}</td>
        <td class="num-done">${r.done.toLocaleString()}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:600;color:${remColor}">${remDisp}</td>
        <td style="text-align:right;padding:0.4rem 1.4rem"><input type="number" id="${dailyId}" min="1" value="${DB_MAP[r.category]?.dailyDefault ?? ''}" placeholder="—" style="width:70px;text-align:right;border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.5rem;font-size:0.82rem;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--text);outline:none;" oninput="calcDays('${r.category}',${rem ?? 0})"></td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:0.88rem;color:var(--text-dim)" id="${daysId}">—</td>
      </tr>`;
    }).join('');

    const totalRemaining = DB_TOTAL_TARGET - totalDone;
    document.getElementById('totalRow').innerHTML = `
      <td>合計</td>
      <td class="num">${DB_TOTAL_STYLES.toLocaleString()}</td>
      <td class="num-total">${DB_TOTAL_TARGET.toLocaleString()}</td>
      <td class="num-done" style="color:var(--green)">${totalDone.toLocaleString()}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700;color:${totalRemaining <= 0 ? 'var(--green)' : 'var(--yellow)'}">${totalRemaining <= 0 ? '✓ 全部完成' : totalRemaining.toLocaleString()}</td>
      <td></td>
      <td class="num" id="totalDaysCell">—</td>`;

    // Auto-calculate days with default values
    rows.forEach(r => {
      const rem = r.target !== null ? r.target - r.done : null;
      if (rem !== null) calcDays(r.category, rem);
    });
    updateTotalDays();
  }

  function updateTotalDays() {
    const allDays = DATABASE.map(d => {
      const el = document.getElementById(`days-${d.category}`);
      if (!el) return null;
      const v = el.textContent.replace(/,/g, '');
      return (v && v !== '—' && v !== '✓') ? parseInt(v) : null;
    }).filter(v => v !== null);
    const cell = document.getElementById('totalDaysCell');
    if (!cell) return;
    if (allDays.length === 0) { cell.textContent = '—'; return; }
    const max = Math.max(...allDays);
    cell.textContent = max.toLocaleString();
    cell.style.color = max <= 30 ? 'var(--green)' : max <= 60 ? 'var(--yellow)' : 'var(--red)';
  }

  function calcDays(category, remaining) {
    const dailyEl = document.getElementById(`daily-${category}`);
    const daysEl = document.getElementById(`days-${category}`);
    const daily = parseInt(dailyEl.value);
    if (!daily || daily <= 0 || remaining <= 0) { daysEl.textContent = remaining <= 0 ? '✓' : '—'; updateTotalDays(); return; }
    const days = Math.ceil(remaining / daily);
    daysEl.textContent = days.toLocaleString();
    daysEl.style.color = days <= 30 ? 'var(--green)' : days <= 60 ? 'var(--yellow)' : 'var(--red)';
    updateTotalDays();
  }
</script>
</body>
</html>
