<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍攝進度統計</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2330;
      --border: #2a3045;
      --accent: #4f9eff;
      --accent2: #7dd3fc;
      --text: #e8edf5;
      --text-dim: #8a95aa;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --glow: rgba(79, 158, 255, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,158,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,158,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.5rem;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface2);
      box-shadow: 0 0 0 4px rgba(79,158,255,0.08), inset 0 0 30px rgba(79,158,255,0.05);
    }

    .upload-zone:hover::before,
    .upload-zone.drag-over::before {
      opacity: 1;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      filter: drop-shadow(0 0 12px rgba(79,158,255,0.4));
    }

    .upload-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .upload-hint {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    .upload-btn {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.55rem 1.4rem;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      z-index: 1;
    }

    .upload-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .upload-btn:active { transform: translateY(0); }

    #fileInput { display: none; }

    /* Loaded file chip */
    .file-chip {
      display: none;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .file-chip.show { display: inline-flex; }

    .file-chip-name {
      color: var(--green);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
    }

    /* Error box */
    .error-box {
      display: none;
      margin-top: 1.2rem;
      padding: 0.8rem 1rem;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 0.85rem;
    }

    .error-box.show { display: block; }

    /* Results section */
    #results {
      margin-top: 2.5rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s, transform 0.4s;
    }

    #results.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Stats cards row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .stat-card:hover::after { opacity: 1; }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      font-weight: 400;
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--accent2);
      line-height: 1;
    }

    .stat-unit {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-left: 2px;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .table-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    .table-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.25rem 0.65rem;
      background: rgba(79,158,255,0.12);
      color: var(--accent);
      border-radius: 99px;
      border: 1px solid rgba(79,158,255,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 0.75rem 1.4rem;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 0.9rem 1.4rem;
      font-size: 0.88rem;
      color: var(--text);
    }

    td:last-child {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent2);
      font-weight: 500;
    }

    .category-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 0.6rem;
      vertical-align: middle;
    }

    /* Bar fill */
    .bar-cell { width: 30%; padding-right: 1.4rem; }

    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Total row */
    .total-row td {
      padding: 0.85rem 1.4rem;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      font-weight: 600;
      color: var(--text);
      font-size: 0.88rem;
    }

    .total-row td:last-child {
      color: var(--green);
      font-size: 1rem;
    }

    /* Footer note */
    .note {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0.8rem auto 0;
    }

    .spinner.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 540px) {
      .bar-cell { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <p class="header-label">Photo Progress Tracker</p>
    <h1>拍攝進度<span>統計系統</span></h1>
    <p class="subtitle">上傳 Excel 拍色進度檔，自動統計各商品分類「已拍完」拍攝套數</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="dropZone">
    <span class="upload-icon">📊</span>
    <p class="upload-title">拖曳 Excel 檔案至此</p>
    <p class="upload-hint">.xlsx / .xls &nbsp;·&nbsp; 工作表1 &nbsp;·&nbsp; 欄位：狀態、商品分類、拍攝套數</p>
    <label class="upload-btn" for="fileInput">選擇檔案</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <div class="spinner" id="spinner"></div>
    <div class="file-chip" id="fileChip">
      <span>📄</span>
      <span class="file-chip-name" id="fileName"></span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Results -->
  <section id="results">
    <p class="section-label">統計結果 — 已拍完</p>

    <div class="stats-row" id="statsRow"></div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">商品分類 · 拍攝套數明細</span>
        <span class="table-badge" id="totalBadge">—</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>商品分類</th>
            <th class="bar-cell">佔比</th>
            <th style="text-align:right">拍攝套數</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
          <tr class="total-row" id="totalRow"></tr>
        </tfoot>
      </table>
    </div>

    <p class="note">
      <span>ℹ</span>
      <span>僅統計「已拍完」狀態列；A欄與D欄之合併儲存格已自動向下填滿。</span>
    </p>
  </section>
</div>

<script>
  const COLORS = ['#4f9eff','#7dd3fc','#4ade80','#fbbf24','#f87171','#a78bfa','#fb923c'];

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const spinner = document.getElementById('spinner');
  const fileChip = document.getElementById('fileChip');
  const fileName = document.getElementById('fileName');
  const errorBox = document.getElementById('errorBox');
  const results = document.getElementById('results');

  // Drag & drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) processFile(fileInput.files[0]);
  });

  function showError(msg) {
    errorBox.textContent = '⚠ ' + msg;
    errorBox.classList.add('show');
    spinner.classList.remove('show');
  }

  function processFile(file) {
    errorBox.classList.remove('show');
    results.classList.remove('visible');
    fileChip.classList.remove('show');
    spinner.classList.add('show');

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!raw.length) throw new Error('工作表無資料');

        // detect column names flexibly
        const keys = Object.keys(raw[0]);
        const colA = keys.find(k => /狀態/.test(k)) || keys[0];
        const colD = keys.find(k => /商品分類/.test(k)) || keys[3];
        const colS = keys.find(k => /拍攝套數/.test(k)) || keys[18];

        if (!colS) throw new Error('找不到「拍攝套數」欄位，請確認欄位名稱');

        // forward-fill 狀態 & 商品分類
        let lastA = '', lastD = '';
        const filled = raw.map(row => {
          if (row[colA] !== '') lastA = row[colA];
          if (row[colD] !== '') lastD = row[colD];
          return { status: lastA, category: lastD, count: Number(row[colS]) || 0 };
        });

        // filter 已拍完
        const done = filled.filter(r => r.status === '已拍完');
        if (!done.length) throw new Error('沒有找到狀態為「已拍完」的資料');

        // aggregate
        const agg = {};
        done.forEach(r => { agg[r.category] = (agg[r.category] || 0) + r.count; });
        const sorted = Object.entries(agg).sort((a, b) => b[1] - a[1]);
        const total = sorted.reduce((s, [, v]) => s + v, 0);

        render(sorted, total, done.length, file.name);
        spinner.classList.remove('show');
        fileName.textContent = file.name;
        fileChip.classList.add('show');

        setTimeout(() => results.classList.add('visible'), 50);
      } catch (err) {
        showError(err.message || '解析失敗，請確認檔案格式');
      }
    };
    reader.onerror = () => showError('檔案讀取失敗');
    reader.readAsArrayBuffer(file);
  }

  function render(sorted, total, rowCount, fname) {
    const max = sorted[0][1];

    // Stats cards
    const statsRow = document.getElementById('statsRow');
    statsRow.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">已拍完套數合計</div>
        <div class="stat-value">${total}<span class="stat-unit">套</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">商品分類數</div>
        <div class="stat-value">${sorted.length}<span class="stat-unit">類</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">資料筆數</div>
        <div class="stat-value">${rowCount}<span class="stat-unit">筆</span></div>
      </div>
    `;

    document.getElementById('totalBadge').textContent = `共 ${total} 套`;

    // Table
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = sorted.map(([cat, val], i) => {
      const pct = Math.round(val / max * 100);
      const color = COLORS[i % COLORS.length];
      return `
        <tr>
          <td><span class="category-dot" style="background:${color}"></span>${cat}</td>
          <td class="bar-cell">
            <div class="bar-track">
              <div class="bar-fill" style="width:0%" data-pct="${pct}"></div>
            </div>
          </td>
          <td>${val}</td>
        </tr>`;
    }).join('');

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);

    // Total row
    document.getElementById('totalRow').innerHTML = `
      <td colspan="2" style="color:var(--text-dim);font-size:0.8rem">所有分類合計</td>
      <td>${total}</td>
    `;
  }
</script>
</body>
</html>
